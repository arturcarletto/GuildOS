spring:
  application:
    name: guildos-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    create-schemas: true
    default-schema: guild_os
    schemas: guild_os
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: guild_os
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

guildos:
  discord:
    enabled: ${GUILDOS_DISCORD_ENABLED:false}
    token: ${DISCORD_BOT_TOKEN:}
  telegram:
    enabled: ${GUILDOS_TELEGRAM_ENABLED:false}
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    poll-interval: ${GUILDOS_TELEGRAM_POLL_INTERVAL:2s}
  identity:
    discord-oauth:
      enabled: ${GUILDOS_IDENTITY_DISCORD_OAUTH_ENABLED:false}
      client-id: ${DISCORD_OAUTH_CLIENT_ID:}
      client-secret: ${DISCORD_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${DISCORD_OAUTH_REDIRECT_URI:}
      success-redirect-uri: ${DISCORD_OAUTH_SUCCESS_REDIRECT_URI:/api/v1/me}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
