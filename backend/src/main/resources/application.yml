spring:
  application:
    name: guildos-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    create-schemas: true
    default-schema: guild_os
    schemas: guild_os
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: guild_os
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful

guildos:
  discord:
    enabled: ${GUILDOS_DISCORD_ENABLED:false}
    token: ${DISCORD_BOT_TOKEN:}

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info
