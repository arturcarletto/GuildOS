services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-guildos}
      POSTGRES_USER: ${POSTGRES_USER:-guildos_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-guildos_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - guildos-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  guildos-postgres-data:

